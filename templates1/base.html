{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>{% block title %}News Ticker{% endblock %}</title>
    
    <!-- External CSS - NO inline styles! -->
    <link rel="stylesheet" href="{% static 'news/css/style.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% include "includes/navbar.html" %}
        
        <main>
            {% block content %}
            {% endblock %}
        </main>
        
        <footer class="main-footer">
            <p>&copy; {% now "Y" %} News Ticker | Built with Django ❤️</p>
        </footer>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
