{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    
    <!-- CSS Static Files -->
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
    
    <!-- Favicon (optional) -->
    <link rel="icon" type="image/x-icon" href="{% static 'portfolio/images/favicon.ico' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">MyPortfolio</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="/projects/">Projects</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="social-links">
                <a href="https://github.com/Ruchika402" target="_blank">GitHub</a>
                <a href="#">LinkedIn</a>
                <a href="#">Devfolio</a>
            </div>
            <p>&copy; {% now "Y" %} My Portfolio. Built with Django ❤️</p>
        </div>
    </footer>

    <!-- JavaScript Static Files -->
    <script src="{% static 'portfolio/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
